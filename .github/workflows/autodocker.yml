name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'app.py'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Docker image version tag (e.g., v1.0.0, latest)'
        required: true
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lower case variables
        id: set_vars
        run: |
          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME_LOWER=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION_TAG="${{ github.event.inputs.version }}"
          else
            VERSION_TAG="${{ github.sha }}"
          fi

          echo "REPO_OWNER=$REPO_OWNER_LOWER" >> "$GITHUB_OUTPUT"
          echo "REPO_NAME=$REPO_NAME_LOWER" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.set_vars.outputs.REPO_OWNER }}/${{ steps.set_vars.outputs.REPO_NAME }}:${{ steps.set_vars.outputs.VERSION }}
            ghcr.io/${{ steps.set_vars.outputs.REPO_OWNER }}/${{ steps.set_vars.outputs.REPO_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=${{ steps.set_vars.outputs.REPO_NAME }} Server
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.set_vars.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
